# Reference nginx vhost for paperbot.ganakys.com.
#
# This VPS uses an SNI stream-router on :443 that forwards by server-name to an
# internal nginx on :8444 — so this site terminates TLS on 8444, NOT 443, and
# its hostname is added to the SNI map in /etc/nginx/nginx.conf. On a plain
# single-nginx host, change `listen 8444 ssl http2;` back to `listen 443 ...`.
#
# Companion files:
#   /etc/nginx/conf.d/paperbot-rate-limits.conf  (the limit_req_zone lines below)
#   /etc/nginx/paperbot.htpasswd                 (root:www-data 640) — Basic Auth
#
#   # create the access credential:
#   htpasswd -c /etc/nginx/paperbot.htpasswd paperbot     # or: openssl passwd -apr1
#   chown root:www-data /etc/nginx/paperbot.htpasswd && chmod 640 /etc/nginx/paperbot.htpasswd
#
#   # issue the cert (webroot must be served by the :80 block below):
#   certbot certonly --webroot -w /var/www/certbot -d paperbot.ganakys.com

# --- rate-limit zones (put in /etc/nginx/conf.d/paperbot-rate-limits.conf) ---
# limit_req_zone $binary_remote_addr zone=paperbot_ask:10m    rate=20r/m;
# limit_req_zone $binary_remote_addr zone=paperbot_static:10m rate=120r/m;

server {
    listen 80;
    listen [::]:80;
    server_name paperbot.ganakys.com;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://paperbot.ganakys.com$request_uri; }
}

server {
    listen 8444 ssl http2;          # <- 443 on a normal single-nginx host
    listen [::]:8444 ssl http2;
    server_name paperbot.ganakys.com;

    ssl_certificate     /etc/letsencrypt/live/paperbot.ganakys.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/paperbot.ganakys.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    client_max_body_size 1m;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript image/svg+xml;

    # Access gate — every query spends LLM quota, so the public URL is gated.
    auth_basic           "Research Paper Answer Bot - demo access";
    auth_basic_user_file /etc/nginx/paperbot.htpasswd;

    location = /api/health {           # uptime probe, no auth
        auth_basic off;
        proxy_pass http://127.0.0.1:8011;
        proxy_set_header Host $host;
    }

    location = /api/ask {              # slow LLM endpoint, rate-limited
        limit_req zone=paperbot_ask burst=5 nodelay;
        proxy_pass http://127.0.0.1:8011;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location / {
        limit_req zone=paperbot_static burst=60 nodelay;
        proxy_pass http://127.0.0.1:8011;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
}
